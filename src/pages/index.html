<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>WanderSync</title>
		<style>
			:root{--bg:#f4f7fb;--card:#ffffff;--accent:#2b6cb0}
			body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:var(--bg);display:flex;align-items:center;justify-content:center;height:100vh}
			.card{background:var(--card);padding:32px;border-radius:12px;box-shadow:0 6px 24px rgba(11,22,39,0.08);width:360px}
			h1{margin:0 0 8px;font-size:20px;color:#0f1724}
			p.lead{margin:0 0 20px;color:#475569;font-size:14px}
			label{display:block;font-size:13px;color:#334155;margin-bottom:6px}
			input[type="email"],input[type="password"]{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box}
			.actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
			.btn{background:var(--accent);color:#fff;padding:10px 14px;border-radius:8px;border:0;cursor:pointer}
			.link{font-size:13px;color:#2563eb;text-decoration:none}
			.footer{margin-top:18px;font-size:13px;color:#94a3b8;text-align:center}
		</style>
	</head>
	<body>
		<main class="card" role="main">
			<h1>Welcome back</h1>
			<p class="lead">Sign in to your WanderSync account</p>
			<form action="#" method="post">
				<div>
					<label for="email">Email</label>
					<input id="email" name="email" type="email" placeholder="you@example.com" required />
				</div>
				<div>
					<label for="password">Password</label>
					<input id="password" name="password" type="password" placeholder="••••••••" required />
				</div>
				<div class="actions">
					<a class="link" href="#">Forgot password?</a>
					<button class="btn" type="submit">Log in</button>
				</div>
			</form>
			<div class="footer">Don't have an account? <a class="link" href="#">Sign up</a></div>
		</main>
	</body>
</html>
